<!-- https://github.com/DenverCoder1/readme-typing-svg/ -->
<svg xmlns='http://www.w3.org/2000/svg'
    xmlns:xlink='http://www.w3.org/1999/xlink'
    viewBox='0 0 500 28'
    style='background-color: #00000000;'
    width='500px' height='28px'>

    <style>
@font-face {
  font-family: 'JetBrains Mono';
  font-style: normal;
  font-weight: 400;
  font-display: fallback;
  src: url(data:font/truetype;base64,) format('truetype');
}
</style>

                <path id='path0'>
                            <!-- Single line -->
                                <animate id='d0' attributeName='d' begin='0s;d0.end'
                    dur='7000ms' fill='remove'
                    values='m0,14 h0 ; m0,14 h500 ; m0,14 h500 ; m0,14 h0' keyTimes='0;0.57142857142857;0.85714285714286;1' />
                    </path>
    <text font-family='"JetBrains Mono", monospace' fill='#8B949E' font-size='16'
        dominant-baseline='middle'
        x='50%' text-anchor='middle'
        letter-spacing='normal'>
        <textPath xlink:href='#path0'>
            Electronic Information Engineering Undergraduate
        </textPath>
    </text>
</svg>
